version: "3.9"

services:

  # ── RL Training (run once, outputs model to ./models/) ──────────────────────
  nexus-trainer:
    build:
      context: .
      dockerfile: simulation/Dockerfile
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    command: python simulation/train_agent.py
    profiles: ["train"]   # only runs with: docker-compose --profile train up

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  nexus-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - MODEL_PATH=/app/models/nexus_agent
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── React Dashboard ─────────────────────────────────────────────────────────
  nexus-dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      nexus-api:
        condition: service_healthy
    restart: unless-stopped
